<!DOCTYPE html>
<html lang="en">

<head>

    <title>Contact Almond Cake ☕</title>

    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Contact Page CSS -->
    <link rel="stylesheet" href="./assets/contact.css">

</head>

<body>

    <!-- Header -->
    <header>

        <!-- Home Button -->
        <div title="Home Page" id="home">

            <a href="index.html">

                <img class="still"
                    src="./images/icons/homepage.png"
                    alt="home">

            </a>

        </div>

        <!-- Main Title -->
        <h1>Contact Almond Cake ☕</h1>

        <!-- Subtitle -->
        <p class="contact-text">
            We would love to hear your feedback, ideas,
            and favorite coffee orders ✨
        </p>

    </header>

    <!-- Contact Form -->
    <form action="https://formspree.io/f/xpqbzajk" method="post">

        <!-- Name -->
        <label for="name">Your Name:</label>

        <input
            required
            type="text"
            name="name"
            id="name"
            placeholder="Enter your name">

        <br><br>

        <!-- Email -->
        <label for="email">Your Email:</label>

        <input
            required
            type="email"
            name="email"
            id="email"
            placeholder="Enter your email">

        <br><br>

        <!-- Message -->
        <label for="message">Your Message:</label>

        <br>

        <textarea
            required
            name="message"
            id="message"
            placeholder="Write your message here...">
        </textarea>

        <br><br>

        <!-- Submit Button -->
        <input
            type="submit"
            name="submit"
            value="Send Message ☕">

    </form>

</body>

</html>
