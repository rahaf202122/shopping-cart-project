<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#fff8f0"/>
  <!-- dish/plate -->
  <ellipse cx="150" cy="258" rx="108" ry="17" fill="#d4b896"/>
  <!-- tiramisu layers - bottom -->
  <rect x="55" y="200" width="190" height="45" rx="6" fill="#c4956a"/>
  <!-- cream layer -->
  <rect x="50" y="185" width="200" height="22" rx="6" fill="#f5f0e0"/>
  <!-- ladyfinger layer 2 -->
  <rect x="55" y="148" width="190" height="44" rx="6" fill="#d4a574"/>
  <!-- cream top layer -->
  <rect x="50" y="130" width="200" height="26" rx="6" fill="#fafaf5"/>
  <!-- cocoa dust on top -->
  <rect x="52" y="118" width="196" height="18" rx="6" fill="#8b5a2b" opacity="0.35"/>
  <ellipse cx="150" cy="127" rx="97" ry="10" fill="#8b5a2b" opacity="0.25"/>
  <!-- TIRAMISU text on cream -->
  <text x="150" y="175" text-anchor="middle" font-family="Arial" font-size="14" fill="#6b3a1f" opacity="0.6">TIRAMISU</text>
  <!-- fork -->
  <line x1="235" y1="140" x2="248" y2="220" stroke="#c0a060" stroke-width="3.5"/>
  <line x1="235" y1="140" x2="232" y2="120" stroke="#c0a060" stroke-width="2.5"/>
  <line x1="239" y1="140" x2="237" y2="120" stroke="#c0a060" stroke-width="2.5"/>
  <line x1="243" y1="140" x2="242" y2="120" stroke="#c0a060" stroke-width="2.5"/>
  <text x="150" y="275" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#6b3a1f">Tiramisu</text>
</svg>
