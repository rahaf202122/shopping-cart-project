<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#fff8f0"/>
  <!-- plate -->
  <ellipse cx="150" cy="255" rx="110" ry="18" fill="#e8d5c0"/>
  <!-- cake bottom layer -->
  <rect x="55" y="175" width="190" height="50" rx="5" fill="#c62828"/>
  <!-- cream between layers -->
  <rect x="50" y="168" width="200" height="16" rx="8" fill="#fafafa"/>
  <!-- cake middle layer -->
  <rect x="55" y="120" width="190" height="55" rx="5" fill="#d32f2f"/>
  <!-- cream between layers -->
  <rect x="50" y="113" width="200" height="16" rx="8" fill="#fafafa"/>
  <!-- cake top layer -->
  <rect x="60" y="65" width="180" height="55" rx="5" fill="#e53935"/>
  <!-- top frosting -->
  <path d="M60 65 Q80 50 100 62 Q120 50 140 62 Q160 50 180 62 Q200 50 220 62 Q235 55 240 65" fill="#fafafa"/>
  <ellipse cx="150" cy="63" rx="90" ry="12" fill="#fafafa"/>
  <!-- decorative swirls -->
  <circle cx="110" cy="58" r="10" fill="#fafafa"/>
  <circle cx="150" cy="53" r="12" fill="#fafafa"/>
  <circle cx="190" cy="58" r="10" fill="#fafafa"/>
  <!-- cherry on top -->
  <circle cx="150" cy="40" r="10" fill="#e53935"/>
  <path d="M150 30 Q155 18 162 15" stroke="#388e3c" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- candle -->
  <rect x="145" y="20" width="8" height="22" rx="2" fill="#ffcc02"/>
  <ellipse cx="149" cy="18" rx="4" ry="6" fill="#ff8f00"/>
  <text x="150" y="275" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#b71c1c">Red Velvet</text>
</svg>
