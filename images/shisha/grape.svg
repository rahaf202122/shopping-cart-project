  <path d="M168 82 Q162 58 172 44" stroke="#bbb" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
  <text x="150" y="285" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#40c4c4">Grape Shisha</text>
