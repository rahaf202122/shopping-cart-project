<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#fff8f0"/>
  <!-- base -->
  <rect x="105" y="255" width="90" height="12" rx="5" fill="#795548"/>
  <rect x="115" y="245" width="70" height="14" rx="5" fill="#8d6e63"/>
  <!-- stem -->
  <rect x="136" y="175" width="28" height="75" rx="8" fill="#f9a825"/>
  <!-- bowl -->
  <path d="M100 100 Q80 140 90 175 Q120 195 150 195 Q180 195 210 175 Q220 140 200 100 Z" fill="#fbc02d"/>
  <path d="M108 108 Q90 145 100 172 Q125 188 150 188 Q175 188 200 172 Q210 145 192 108 Z" fill="#fff9c4" opacity="0.35"/>
  <!-- coals -->
  <rect x="90" y="90" width="120" height="18" rx="6" fill="#555"/>
  <rect x="95" y="85" width="110" height="12" rx="5" fill="#e53935"/>
  <rect x="100" y="82" width="100" height="8" rx="4" fill="#ff7043" opacity="0.7"/>
  <ellipse cx="150" cy="90" rx="62" ry="10" fill="#c0c0c0" opacity="0.6"/>
  <!-- hose -->
  <path d="M210 152 Q248 150 255 132 Q261 115 264 98" stroke="#fbc02d" stroke-width="8" stroke-linecap="round" fill="none"/>
  <ellipse cx="264" cy="96" rx="8" ry="5" fill="#f9a825"/>
  <!-- lemon slice on bowl -->
  <circle cx="150" cy="145" r="20" fill="#fff59d" opacity="0.5"/>
  <circle cx="150" cy="145" r="15" fill="#fff176" opacity="0.6"/>
  <line x1="150" y1="125" x2="150" y2="165" stroke="#f9a825" stroke-width="1.5" opacity="0.6"/>
  <line x1="130" y1="145" x2="170" y2="145" stroke="#f9a825" stroke-width="1.5" opacity="0.6"/>
  <!-- smoke -->
  <path d="M140 80 Q132 60 142 45" stroke="#bbb" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M160 78 Q153 56 163 42" stroke="#bbb" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <text x="150" y="285" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#e65100">Lemon Mint</text>
</svg>
