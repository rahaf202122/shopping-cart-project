<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#fff8f0"/>
  <!-- glass -->
  <path d="M90 60 L105 260 Q150 272 195 260 L210 60 Z" fill="#fce4ec" opacity="0.6"/>
  <path d="M90 60 L105 260 Q150 272 195 260 L210 60 Z" fill="none" stroke="#f48fb1" stroke-width="3"/>
  <!-- liquid fill -->
  <path d="M93 90 L107 260 Q150 272 193 260 L207 90 Z" fill="#f48fb1" opacity="0.5"/>
  <!-- ice cubes -->
  <rect x="110" y="95" width="28" height="28" rx="5" fill="white" opacity="0.6"/>
  <rect x="148" y="88" width="26" height="26" rx="5" fill="white" opacity="0.55"/>
  <rect x="175" y="98" width="24" height="24" rx="5" fill="white" opacity="0.5"/>
  <!-- mint leaves -->
  <ellipse cx="125" cy="80" rx="15" ry="9" fill="#81c784" transform="rotate(-20 125 80)"/>
  <ellipse cx="150" cy="72" rx="16" ry="9" fill="#66bb6a" transform="rotate(10 150 72)"/>
  <ellipse cx="175" cy="78" rx="14" ry="8" fill="#81c784" transform="rotate(-10 175 78)"/>
  <!-- straw -->
  <line x1="178" y1="55" x2="170" y2="270" stroke="#f06292" stroke-width="6" stroke-linecap="round"/>
  <!-- bubbles -->
  <circle cx="120" cy="180" r="5" fill="white" opacity="0.4"/>
  <circle cx="160" cy="155" r="4" fill="white" opacity="0.35"/>
  <circle cx="140" cy="200" r="3" fill="white" opacity="0.4"/>
  <!-- base -->
  <ellipse cx="150" cy="268" rx="48" ry="10" fill="#f48fb1" opacity="0.3"/>
  <text x="150" y="290" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#ad1457">Pink Mojito</text>
</svg>
