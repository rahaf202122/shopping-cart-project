<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#fff8f0"/>
  <!-- glass -->
  <path d="M88 62 L103 258 Q150 272 197 258 L212 62 Z" fill="#ffebee" opacity="0.65"/>
  <path d="M88 62 L103 258 Q150 272 197 258 L212 62 Z" fill="none" stroke="#ef5350" stroke-width="3"/>
  <!-- red liquid -->
  <path d="M91 95 L105 258 Q150 272 195 258 L209 95 Z" fill="#ef5350" opacity="0.45"/>
  <!-- ice -->
  <rect x="108" y="100" width="26" height="26" rx="5" fill="white" opacity="0.6"/>
  <rect x="150" y="92" width="24" height="24" rx="5" fill="white" opacity="0.55"/>
  <rect x="177" y="102" width="22" height="22" rx="5" fill="white" opacity="0.5"/>
  <!-- strawberry slices on rim -->
  <path d="M138 60 Q150 48 162 60" fill="#e53935"/>
  <polygon points="150,48 143,65 157,65" fill="#c62828"/>
  <!-- mint -->
  <ellipse cx="118" cy="78" rx="14" ry="8" fill="#81c784" transform="rotate(-25 118 78)"/>
  <ellipse cx="180" cy="75" rx="13" ry="8" fill="#66bb6a" transform="rotate(15 180 75)"/>
  <!-- straw -->
  <line x1="120" y1="55" x2="128" y2="270" stroke="#e53935" stroke-width="6" stroke-linecap="round"/>
  <!-- bubbles -->
  <circle cx="155" cy="170" r="5" fill="white" opacity="0.4"/>
  <circle cx="175" cy="200" r="4" fill="white" opacity="0.35"/>
  <text x="150" y="290" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#c62828">Strawberry Mojito</text>
</svg>
