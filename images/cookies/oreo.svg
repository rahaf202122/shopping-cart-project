<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#fff8f0"/>
  <!-- stack of 3 cookies -->
  <!-- bottom cookie -->
  <ellipse cx="150" cy="230" rx="85" ry="22" fill="#2c1810"/>
  <ellipse cx="150" cy="224" rx="85" ry="22" fill="#1a0d08"/>
  <!-- cream -->
  <ellipse cx="150" cy="208" rx="80" ry="16" fill="#f5f0e8"/>
  <!-- middle cookie -->
  <ellipse cx="150" cy="196" rx="85" ry="22" fill="#2c1810"/>
  <ellipse cx="150" cy="190" rx="85" ry="22" fill="#1a0d08"/>
  <!-- cream -->
  <ellipse cx="150" cy="174" rx="80" ry="16" fill="#f5f0e8"/>
  <!-- top cookie -->
  <ellipse cx="150" cy="162" rx="85" ry="22" fill="#2c1810"/>
  <ellipse cx="150" cy="156" rx="85" ry="22" fill="#1a0d08"/>
  <!-- pattern on top cookie -->
  <ellipse cx="150" cy="153" rx="60" ry="15" fill="none" stroke="#3d2418" stroke-width="2"/>
  <text x="150" y="158" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3d2418">OREO</text>
  <!-- shine -->
  <ellipse cx="125" cy="148" rx="15" ry="6" fill="white" opacity="0.1" transform="rotate(-20 125 148)"/>
  <text x="150" y="270" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#2c1810">Oreo Stack</text>
</svg>
