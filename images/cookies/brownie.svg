<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#fff8f0"/>
  <!-- brownie base -->
  <rect x="55" y="120" width="190" height="130" rx="12" fill="#3d1c02"/>
  <rect x="55" y="115" width="190" height="130" rx="12" fill="#5c2d0a"/>
  <rect x="60" y="118" width="180" height="120" rx="10" fill="#4a2208"/>
  <!-- top texture / crust -->
  <rect x="60" y="116" width="180" height="25" rx="10" fill="#6b3515"/>
  <!-- chocolate chunks on top -->
  <rect x="80" y="105" width="22" height="18" rx="4" fill="#2c1505"/>
  <rect x="120" y="100" width="20" height="16" rx="4" fill="#2c1505"/>
  <rect x="165" y="106" width="24" height="17" rx="4" fill="#2c1505"/>
  <rect x="198" y="102" width="18" height="15" rx="4" fill="#2c1505"/>
  <!-- shine on top -->
  <rect x="65" y="119" width="80" height="8" rx="4" fill="white" opacity="0.12"/>
  <!-- fudge drizzle -->
  <path d="M90 145 Q110 135 130 148 Q150 158 170 143 Q190 130 210 145" stroke="#2c1505" stroke-width="3" fill="none" opacity="0.5"/>
  <text x="150" y="200" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="#e8c49a">Brownie</text>
  <text x="150" y="225" text-anchor="middle" font-family="Arial" font-size="15" fill="#d4a870">Chocolate Fudge</text>
  <text x="150" y="268" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#5c2d0a">Fudge Brownie</text>
</svg>
