<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#fff8f0"/>
  <!-- popsicle stick -->
  <rect x="141" y="220" width="18" height="65" rx="6" fill="#d4a574"/>
  <!-- popsicle body -->
  <rect x="70" y="80" width="160" height="150" rx="25" fill="#ffcc02"/>
  <rect x="70" y="80" width="160" height="150" rx="25" fill="#ffa726" opacity="0.7"/>
  <!-- gradient effect -->
  <rect x="72" y="82" width="156" height="80" rx="23" fill="#ffd54f" opacity="0.5"/>
  <!-- mango pattern -->
  <ellipse cx="115" cy="145" rx="28" ry="22" fill="#ff8f00" opacity="0.4"/>
  <ellipse cx="185" cy="135" rx="25" ry="20" fill="#ff6f00" opacity="0.35"/>
  <ellipse cx="150" cy="165" rx="30" ry="18" fill="#ff8f00" opacity="0.3"/>
  <!-- shine -->
  <ellipse cx="110" cy="110" rx="30" ry="18" fill="white" opacity="0.25" transform="rotate(-20 110 110)"/>
  <!-- mango text -->
  <text x="150" y="168" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="white">MANGO</text>
  <text x="150" y="288" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#e65100">Mango Pop</text>
</svg>
