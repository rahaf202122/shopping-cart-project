  <!-- left scoop -->
  <ellipse cx="120" cy="162" rx="45" ry="42" fill="#c8e6c9"/>
  <ellipse cx="120" cy="155" rx="45" ry="42" fill="#a5d6a7"/>
  <!-- right scoop -->
  <ellipse cx="182" cy="162" rx="45" ry="42" fill="#c8e6c9"/>
  <ellipse cx="182" cy="155" rx="45" ry="42" fill="#a5d6a7"/>
