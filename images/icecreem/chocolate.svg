<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#fff8f0"/>
  <!-- cone -->
  <polygon points="150,280 88,160 212,160" fill="#e8a85a"/>
  <!-- cone grid lines -->
  <line x1="150" y1="280" x2="120" y2="160" stroke="#c4854a" stroke-width="1.5"/>
  <line x1="150" y1="280" x2="180" y2="160" stroke="#c4854a" stroke-width="1.5"/>
  <line x1="100" y1="200" x2="200" y2="200" stroke="#c4854a" stroke-width="1.5"/>
  <line x1="95" y1="220" x2="205" y2="220" stroke="#c4854a" stroke-width="1.5"/>
  <line x1="92" y1="240" x2="208" y2="240" stroke="#c4854a" stroke-width="1.5"/>
  <!-- chocolate scoop -->
  <ellipse cx="150" cy="155" rx="62" ry="55" fill="#4e2b0e"/>
  <ellipse cx="150" cy="148" rx="62" ry="55" fill="#6b3a1f"/>
  <!-- shine -->
  <ellipse cx="128" cy="125" rx="18" ry="14" fill="white" opacity="0.18" transform="rotate(-20 128 125)"/>
  <!-- drips -->
  <path d="M112 158 Q108 175 114 185" stroke="#5c2d0a" stroke-width="6" stroke-linecap="round" fill="none"/>
  <path d="M188 158 Q193 172 188 182" stroke="#5c2d0a" stroke-width="5" stroke-linecap="round" fill="none"/>
  <!-- chocolate chips on top -->
  <ellipse cx="140" cy="130" rx="8" ry="6" fill="#2c1505"/>
  <ellipse cx="162" cy="125" rx="7" ry="5" fill="#2c1505"/>
  <ellipse cx="150" cy="145" rx="7" ry="5" fill="#2c1505"/>
  <text x="150" y="296" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#4e2b0e">Choco Cone</text>
</svg>
